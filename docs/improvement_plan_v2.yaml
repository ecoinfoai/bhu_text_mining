output_file_structure: |
  {output_dir}/
  ├── res_lvl1/
  │   ├── concept_results.yaml            # 기존 유지
  │   ├── graph_comparison_results.yaml    # 신규: P/R/F1 + 에지 분류
  │   └── triplet_extraction_raw.yaml      # 신규: 3-call 원본 (디버깅)
  ├── res_lvl2/
  │   └── feedback_results.yaml            # 신규: 코칭 피드백 (기존 llm_results.yaml 대체)
  ├── res_lvl3/
  │   └── statistical_results.yaml         # 기존 유지
  ├── res_lvl4/
  │   ├── ensemble_results.yaml            # 기존 구조 유지 (가중치 변경)
  │   ├── counseling_summary.yaml          # 확장: 피드백 텍스트 포함
  │   ├── technical_report.yaml            # 확장: 그래프 비교 상세 포함
  │   ├── graphs/
  │   │   ├── S001_q1_graph.png
  │   │   └── ...
  │   └── reports/
  │       ├── S001_report.pdf
  │       └── ...
  └── longitudinal/
      └── student_progress.yaml            # 주차별 누적

# =============================================================================
# 잠재적 도전 과제
# =============================================================================

potential_challenges:

  triplet_consistency:
    title: "LLM 트리플릿 추출의 일관성"
    risk: "3-call에서 관계 표현이 달라질 수 있음 ('분비하다' vs '분비')"
    mitigation:
      - "퍼지 매칭으로 relation 유사도 비교"
      - "프롬프트에서 '동사형으로 간결하게' 지시"
      - "과반수 합의 시 임베딩 유사도 >= 0.85면 동일로 간주"

  api_cost:
    title: "API 비용"
    risk: "학생x문항x3 call (추출) + 학생x문항x1 call (피드백)"
    mitigation:
      - "--skip-graph, --skip-feedback 옵션"
      - "동일 답변 트리플릿 결과 캐시"

  execution_order:
    title: "Layer 실행 순서 변경에 따른 복잡도"
    risk: "기존 L1->L2->L3->L4에서 L1->L3->L4(1차)->L2->L4(최종)으로 변경"
    mitigation: "Layer4의 점수 계산과 리포트 생성을 분리하여 2회 호출"

  korean_font:
    title: "DiGraph 시각화 한국어 렌더링"
    risk: "matplotlib에서 한국어 폰트 미설정 시 글자 깨짐"
    mitigation: "font_utils.py의 find_korean_font() 재사용"
