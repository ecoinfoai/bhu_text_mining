project:
  name: "formative-analysis"
  branch: "001-professor-report"
  feature: "Professor Class Summary PDF Report"
  spec: "specs/001-professor-report/spec.md"
  plan: "specs/001-professor-report/plan.md"
  tasks_md: "specs/001-professor-report/tasks.md"
  language: Python
  python_version: ">=3.11,<4"

architecture:
  new_modules:
    - src/forma/professor_report_data.py
    - src/forma/professor_report_charts.py
    - src/forma/professor_report_llm.py
    - src/forma/professor_report.py
    - src/forma/cli_report_professor.py
  modified:
    - src/forma/prompt_templates.py
    - pyproject.toml
  tests:
    - tests/test_professor_report_data.py
    - tests/test_professor_report_charts.py
    - tests/test_professor_report_llm.py
    - tests/test_professor_report.py
    - tests/test_cli_report_professor.py

constitution:
  path: "specs/001-professor-report/plan.md"
  principles:
    I: "Module-First Architecture"
    II: "CLI Interface Mandate"
    III: "Test-First Development (TDD - NON-NEGOTIABLE)"
    IV: "Data Pipeline Integrity"
    V: "Korean Text Safety (_esc() for all Paragraph text)"
    VI: "LLM Boundary Separation (only professor_report_llm.py has LLM imports)"
    VII: "Pattern Consistency (matplotlib.use('Agg') before pyplot, plt.close in finally)"

key_design_decisions:
  fallback_text: "f-strings only (NOT string.Template — does not support :.2f)"
  conditional_formatting: "±0.5 SD threshold; green (#E8F5E9) / red (#FFEBEE)"
  at_risk_criteria: "6 criteria, OR logic"
  level_labels_korean: "상/중상/중하/하"
  overall_level: "mode of per_question_levels; tie-break to lower level"
  z_score: "(score - class_mean) / class_std; 0.0 if std == 0"
  heatmap_placement: "summary page, after question difficulty bar"
  lollipop_placement: "after comparison table"
  concept_mastery_heatmap_signature: "concept_mastery_heatmap(self, mastery_data: dict[int, dict[str, float]]) -> BytesIO"
