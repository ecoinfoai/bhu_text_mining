implementation:
  file: src/forma/professor_report_llm.py
  functions:
    - generate_professor_analysis
  description: >
    generate_professor_analysis(provider, report_data) modifies report_data
    in-place with two independent try/except blocks (one for overall_assessment,
    one for teaching_suggestions). Each block calls provider.generate() with
    keyword arguments system_instruction, max_tokens=1500, temperature=0.3.
    Empty responses and markdown-fenced responses are treated as failures.
    On failure, fallback functions are used and llm_generation_failed is set
    to True. llm_model_used is taken from getattr(provider, 'model_name',
    'unknown'). llm_error_message is set to None when no errors occur.
    PROFESSOR_ANALYSIS_SYSTEM_INSTRUCTION imported lazily from prompt_templates.
