directive:
  metadata:
    id: "DIR-20260308-001"
    from: "orchestrator"
    to: "developer"
    created: "2026-03-08"
    priority: "HIGH"
    phase: "Phase 4 — User Story 2 (P2)"

  task:
    id: "TASK-US2"
    type: "implement"
    title: "US2: Student Comparison Table with Conditional Formatting"
    description: |
      Implement the student comparison matrix table for the professor PDF report.
      This includes:
        1. Tests for conditional formatting helpers (TDD RED first)
        2. Tests for _build_comparison_table (TDD RED first)
        3. Implementation of compute_conditional_indicator + get_conditional_bg_color
        4. Implementation of _build_comparison_table

    tdd_requirement: |
      Constitution Principle III: TDD is NON-NEGOTIABLE.
      Write tests FIRST (ensure they FAIL), then implement.
      T019 and T020 must fail before T021 and T022 are written.

    tasks:
      - id: T019
        parallel: true
        file: tests/test_professor_report_data.py
        description: |
          Write tests for conditional formatting helpers:
          - compute_conditional_indicator(score, mean, std) returning "+"/"-"/""
          - get_conditional_bg_color(score, mean, std) returning HexColor
          Tests: score > mean+0.5*std → "+", score < mean-0.5*std → "-", else ""
          Tests: std==0 → always neutral "" (no indicators)
          Tests: green #E8F5E9 for "+", red #FFEBEE for "-", white for ""

      - id: T020
        parallel: true
        file: tests/test_professor_report.py
        description: |
          Write tests for _build_comparison_table(report_data):
          - Correct row count (n_students + header rows)
          - 2-level header structure with SPAN for question groups
          - Sort order: overall_ensemble_mean descending
          - Korean level labels: 상/중상/중하/하
          - Adaptive columns: 3 sub-cols for <=3 questions, 2 sub-cols for 4+
          - student_rank_lollipop Image flowable appears after the table

      - id: T021
        parallel: false
        depends_on: [T019]
        file: src/forma/professor_report_data.py
        description: |
          Implement in professor_report_data.py (AFTER T019 tests pass):

          def compute_conditional_indicator(score: float, mean: float, std: float) -> str:
              if std == 0:
                  return ""
              if score >= mean + 0.5 * std:
                  return "+"
              if score <= mean - 0.5 * std:
                  return "-"
              return ""

          def get_conditional_bg_color(score: float, mean: float, std: float):
              from reportlab.lib.colors import HexColor, white
              indicator = compute_conditional_indicator(score, mean, std)
              if indicator == "+":
                  return HexColor("#E8F5E9")
              if indicator == "-":
                  return HexColor("#FFEBEE")
              return white  # or HexColor("#FFFFFF")

      - id: T022
        parallel: false
        depends_on: [T020, T021]
        file: src/forma/professor_report.py
        description: |
          Implement _build_comparison_table(self, report_data) in professor_report.py.

          STRUCTURE:
          - 2-level header:
            Row 0: [순위, 종합] + [Q{sn} (spanning sub-cols)] per question
            Row 1: [rank, level, score] for overall + [level, score] per question (or 3-col variant)
          - Student rows:
            Sorted by overall_ensemble_mean descending
            Korean level: 상/중상/중하/하 (from _KOREAN_LEVELS dict)
            Conditional bg: get_conditional_bg_color(per_q_score, q_mean, q_std)
          - Adaptive columns:
            If n_questions <= 3: 3 sub-cols per question (level, score, coverage)
            If n_questions >= 4: 2 sub-cols per question (level, score)
          - Header style:
            BACKGROUND (#37474F) + white text for header rows
            LINEBEFORE for column group separators
            SPAN for question group headers
          - After table: embed student_rank_lollipop chart as Image flowable
            chart_buf = self._chart_gen.student_rank_lollipop(report_data.student_rows)

          NOTE: student_rank_lollipop is implemented in T041.
          For now, wrap in try/except (AttributeError, NotImplementedError) like concept_mastery_heatmap.

    acceptance_criteria:
      - "All T019 tests pass (conditional formatting correctly computed)"
      - "All T020 tests pass (comparison table structure verified)"
      - "Korean level labels display correctly: 상/중상/중하/하"
      - "Conditional formatting: ±0.5 SD threshold applied"
      - "Table sorted by overall_ensemble_mean descending"
      - "student_rank_lollipop gracefully skipped if not implemented"
      - "No LLM imports in professor_report_data.py or professor_report.py"

    references:
      spec_section: "FR-004 (comparison table), FR-005 (conditional formatting)"
      plan_section: "Module 4 professor_report.py — Key Design Decisions"
      data_model: "specs/001-professor-report/data-model.md"
      existing_files:
        - src/forma/professor_report_data.py
        - src/forma/professor_report.py
        - tests/test_professor_report_data.py
        - tests/test_professor_report.py

  constraints:
    must_follow:
      - "Constitution Principle III: TDD (RED before GREEN)"
      - "Constitution Principle V: _esc() for all Paragraph text"
      - "Constitution Principle VI: no LLM imports in data/chart/pdf modules"
      - "Korean labels: 상/중상/중하/하 (not English)"
      - "Minimum table font: 8pt (Korean readability)"
      - "Header background: #37474F (dark) with white text"

  expected_output:
    files:
      - tests/test_professor_report_data.py  (new tests added)
      - tests/test_professor_report.py        (new tests added)
      - src/forma/professor_report_data.py    (new functions added)
      - src/forma/professor_report.py         (_build_comparison_table implemented)
    status_update: true
    completion_signal: "Update .agent-comm/developer/submission.yaml when done"
    test_command: "pytest tests/test_professor_report_data.py tests/test_professor_report.py -v"
